# =============================================================
# Splunk Universal Forwarder - outputs.conf
# Shared across all platforms (Windows + Linux)
# Deploy to:
#   Windows : %SPLUNK_HOME%\etc\system\local\outputs.conf
#   Linux   : $SPLUNK_HOME/etc/system/local/outputs.conf
# =============================================================

# ── Option A: Single Indexer (lab / small environment) ────────

[tcpout]
defaultGroup = primary_indexer

[tcpout:primary_indexer]
server = <INDEXER_IP>:9997
# Set to true in production — see TLS block below
useSSL = false
compressed = true
sendCookedData = true

# ── Option B: Indexer Cluster (recommended for production) ────
# Uncomment this section and comment out Option A when deploying
# to a clustered environment. UF load-balances automatically.

#[tcpout]
#defaultGroup = indexer_cluster

#[tcpout:indexer_cluster]
#server = <INDEXER1_IP>:9997,<INDEXER2_IP>:9997,<INDEXER3_IP>:9997
#autoLBFrequency = 30
#useSSL = true
#sslCertPath = $SPLUNK_HOME/etc/certs/splunkuf.pem
#sslRootCAPath = $SPLUNK_HOME/etc/certs/cacert.pem
#sslVerifyServerCert = true
#compressed = true
#sendCookedData = true

# ── TLS Configuration (production requirement) ────────────────
# WARNING: Splunk traffic is unencrypted by default.
# NSA and CISA mandate encrypted log transport in production.
# Reference: https://docs.splunk.com/Documentation/Splunk/latest/Security/AboutTLS
#
#[tcpout:indexer_cluster]
#server = <INDEXER_IP>:9997
#useSSL = true
#sslCertPath = $SPLUNK_HOME/etc/certs/client.pem
#sslPassword = <cert_password>
#sslRootCAPath = $SPLUNK_HOME/etc/certs/cacert.pem
#sslVerifyServerCert = true
#sslCommonNameToCheck = <indexer_common_name>
#sslAltNameToCheck = <indexer_san>
#cipherSuite = ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256
#ecdhCurves = prime256v1,secp384r1,secp521r1
#sslVersions = tls1.2,tls1.3
